<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script src="script.js"></script>
    <link rel="shortcut icon" href="assets/favicon.ico" type="image/x-icon">
    <title>Sulash Designer</title>
</head>

<body>
    <header>

        <ul>
            <li><a class="headerlinks" href="#contato">Contato</a></li>
            <li><a class="logo" href="#principal"><img src="assets/logo.png" alt="logo escrita Sulash"></a></li>
            <li><a class="headerlinks" href="#local">Serviços</a></li>
        </ul>

    </header>
    <main>
        <section id="principal">
            <img src="assets/principal.png" alt="imagem de Suelen Santos, 'Sulash'">
            <div>
                <h1 style="font-family: 'Roboto Light';
                font-variant: Italic;
                font-weight: 300;">Olá, sou Sulash e sou </h1>
                <h2 style="font-family: 'Roboto';
                font-weight: 300; margin-right: 310px;"> Designer</h2>
            </div>
        </section>
        <section id="grid">
            <h2>“Meu propósito é cuidar da sua <strong>autoestima</strong>”</h2>
            <div class="angry-grid">
                <div id="item-0">&nbsp;</div>
                <div id="item-1">&nbsp;</div>
                <div id="item-2">&nbsp;</div>
                <div id="item-3">&nbsp;</div>
                <div id="item-4">&nbsp;</div>
            </div>

        </section>
        <div id="fundo"></div>
        <section id="servicos">
            <h2>Serviços</h2>
            <div id="servicosdiv">
                <div id="produtos"></div>
                <div id="produtos"></div>
                <div id="produtos"></div>
                <div id="produtos"></div>
                <div id="produtos"></div>
                <div id="produtos"></div>

            </div>
        </section>
        <section id="contato">
            <h2>Contato</h2>
            <div id="contatodiv">
                <div id="suelen">
                    <div id="insta" style="background-color: #FFCFCF;width: 175px; height: 100px; border-radius: 30px; display: flex; align-items: center; justify-content: center; margin-bottom: 30px;">
                        <a href="https://www.instagram.com/sulashdesigner/?hl=pt"
                            target="_blank" style="text-decoration: none; color: inherit;"><img
                                src="assets/insta.png" style="height: 70px; width: 60px;" alt="maps"> Instagram </a>
                    </div>
                    <div id="tiktok" style="background-color: #FFCFCF;width: 175px; height: 100px; border-radius: 30px; display: flex; align-items: center; justify-content: center; margin-bottom: 30px;">
                        <a href="https://www.tiktok.com/@sulashdesigner"
                            target="_blank" style="text-decoration: none; color: inherit;"><img
                                src="assets/tiktok.png" style="height: 70px; width: 60px;" alt="maps"> TikTok </a>
                    </div>
                    <div id="face" style="background-color: #FFCFCF;width: 175px; height: 100px; border-radius: 30px; display: flex; align-items: center; justify-content: center; margin-bottom: 30px;">
                        <a href="https://www.facebook.com/sulashdesignerr"
                            target="_blank" style="text-decoration: none; color: inherit;"><img
                                src="assets/face.png" style="height: 70px; width: 60px;" alt="maps"> Facebook </a>
                    </div>
                    <div id="whats" style="background-color: #FFCFCF;width: 175px; height: 100px; border-radius: 30px; display: flex; align-items: center; justify-content: center; margin-bottom: 30px;">
                        <a href="https://api.whatsapp.com/message/LVHVXRYOFYHNM1?autoload=1&app_absent=0"
                            target="_blank" style="text-decoration: none; color: inherit;"><img
                                src="assets/whats.png" style="height: 70px; width: 60px;" alt="maps"> Whatsapp </a>
                    </div>
                </div>
                <div id="studio">

                </div>
            </div>
        </section>
        <section id="local">
            <div id="localdiv">
                <div id="frame">
                    <iframe
                        src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d5167.598241369908!2d-46.80675745203861!3d-23.674393060556522!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x94ce53322cb660ef%3A0x99142bf1bd3e7064!2sStudio%20Mont%20Blanc!5e0!3m2!1spt-BR!2sbr!4v1695876660663!5m2!1spt-BR!2sbr"
                        width="100%" height="100%" style="border:0; border-radius: 30px;" allowfullscreen=""
                        loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
                </div>
                <div id="endereco">
                    <h2>Localização</h2>
                    <p>Studio Mont Blanc</p>
                    <p>Estrada de Itapecerica a Campo Limpo, 3079 - São Paulo, SP</p>
                    <p>Telefone: (11) 97409-0814</p>
                    <br><br>
                    <div id="maps" style="background-color: #FFCFCF;width: 175px; height: 100px; border-radius: 30px; display: flex; align-items: center; justify-content: center;">
                        <a href="https://www.google.com/maps/place/Studio+Mont+Blanc/@-23.6743931,-46.8067575,16.5z/data=!4m10!1m2!2m1!1sstudio+monte+blanc!3m6!1s0x94ce53322cb660ef:0x99142bf1bd3e7064!8m2!3d-23.6738775!4d-46.803134!15sChJzdHVkaW8gbW9udGUgYmxhbmOSAQxiZWF1dHlfc2Fsb27gAQA!16s%2Fg%2F11s9dprx6q?entry=ttu"
                            target="_blank" style="text-decoration: none; color: inherit;"><img
                                src="assets/maps.png" style="height: 70px; width: 60px;" alt="maps"> Maps </a>
                    </div>
                </div>
            </div>
        </section>
    </main>
</body>

</html>
